                            {i > 0 && <span className="pill-arrow">→</span>}
                            <div className="pill" style={{ background: color.bg, borderColor: color.border, color: color.text }}>
                                {iconSrc ? (
                                    <img src={iconSrc} style={{width:20,height:20,objectFit:"contain"}} onError={(e)=>e.target.style.display="none"} />
                                ) : (
                                    <div style={{width:20,height:20,borderRadius:4,background:color.border,opacity:0.5,flexShrink:0}}></div>
                                )}
                                <div style={{display:"flex",flexDirection:"column",lineHeight:"1.2"}}>
                                    <span style={{fontWeight:700,fontSize:"0.75rem"}}>{step.n}</span>
                                    <span style={{fontSize:"0.6rem",opacity:0.7,fontWeight:400}}>{step.r}</span>
                                </div>
                            </div>
                        </React.Fragment>
                    );
                })}
            </div>
        );

        const App = () => {
            const [selectedTool, setSelectedTool] = React.useState(null);
            const [search, setSearch] = React.useState("");
            const [activeCategory, setActiveCategory] = React.useState("All");
            const [activeTab, setActiveTab] = React.useState("vibe");

            const categoriesMap = { "Essentials": ALL_TOOLS.filter(t => t.popular) };
            const otherTools = ALL_TOOLS.filter(t => !t.popular);
            otherTools.forEach(t => { if (!categoriesMap[t.category]) categoriesMap[t.category] = []; categoriesMap[t.category].push(t); });
            const sortedCategories = ["Essentials", ...Object.keys(categoriesMap).filter(c => c !== "Essentials").sort()];

            const getFilteredCategories = () => {
                const query = search.toLowerCase();
                let filteredMap = [];
                sortedCategories.forEach(cat => {
                    if (activeCategory !== "All" && activeCategory !== cat) return;
                    let tools = categoriesMap[cat];
                    if (query) {
                        tools = tools.filter(t => 
                            t.name.toLowerCase().includes(query) || 
                            t.category.toLowerCase().includes(query) ||
                            t.vibe.toLowerCase().includes(query)
                        );
                    }
                    if (tools.length > 0) {
                        filteredMap.push({ name: cat, tools: tools });
                    }
                });
                return filteredMap;
            };

            const renderedCategories = getFilteredCategories();

            const scrollToCategory = (catName) => {
                setActiveCategory(catName);
                const el = document.getElementById("cat-" + catName.replace(/\\s+/g, ""));
                if(el) el.scrollIntoView({ behavior: "smooth" });
            };

            const openTool = (tool) => {
                setSelectedTool(tool);
                setActiveTab(tool.setup ? "setup" : "vibe");
            };

            const handleConnectionClick = (connId) => {
                const found = ALL_TOOLS.find(t => t.id === connId);
                if (found) openTool(found);
            };

            const renderDashboard = () => (
                <div className="flex h-[calc(100vh-3.5rem)] w-full">
                    <div className="sidebar py-4 hidden md:block">
                        <div className="px-4 mb-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Categories</div>
                        <div onClick={() => setActiveCategory("All")} className={"sidebar-item " + (activeCategory === "All" ? "active" : "")}>
                            All Services
                        </div>
                        {sortedCategories.map(cat => (
                            <div key={cat} onClick={() => scrollToCategory(cat)} className={"sidebar-item " + (activeCategory === cat ? "active" : "")}>
                                {cat}
                            </div>
                        ))}
                    </div>

                    <div className="flex-1 overflow-y-auto bg-[#f8f9fa]">
                        <div className="sticky top-0 bg-white border-b border-gray-200 p-6 z-10 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-[#16191f]">Vibe-to-Cloud Playbook</h1>
                                <p className="text-gray-500 text-sm">Click any service for setup guides, connections & pipeline architectures.</p>
                            </div>
                            <div className="w-full md:w-96 relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                   <svg className="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clipRule="evenodd" /></svg>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="Filter by name, category, or vibe..." 
                                    className="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-300 rounded focus:bg-white focus:outline-none focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb]"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="p-8 max-w-7xl mx-auto">
                            {renderedCategories.length === 0 && (
                                <div className="text-center py-20">
                                    <svg className="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                    <h3 className="text-lg font-medium text-gray-900">No tools found</h3>
                                    <p className="mt-1 text-gray-500">We could not find anything matching your filter.</p>
                                </div>
                            )}

                            {renderedCategories.map(cat => (
                                <div key={cat.name} id={"cat-" + cat.name.replace(/\\s+/g, "")} className="mb-12">
                                    <div className="flex items-center mb-6">
                                        <h2 className="text-xl font-bold text-[#232f3e]">
                                            {cat.name}
                                        </h2>
                                        <div className="ml-4 flex-1 h-px bg-gray-200"></div>
                                        <span className="ml-4 text-sm font-semibold text-gray-400 bg-gray-100 py-1 px-2 rounded-full">{cat.tools.length}</span>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                        {cat.tools.map(tool => (
                                            <div key={tool.id} onClick={() => openTool(tool)} className="aws-card flex flex-col group">
                                                <div className="flex items-center space-x-3 mb-3">
                                                    <img src={tool.icon} className="w-8 h-8 object-contain" onError={(e)=>e.target.style.display="none"} />
                                                    <span className="font-bold text-[#232f3e] group-hover:text-[#0073bb] transition-colors">{tool.name}</span>
                                                </div>
                                                {tool.popular ? (
                                                    <p className="text-xs text-gray-600 mt-auto line-clamp-2">{tool.vibe}</p>
                                                ) : (
                                                    <p className="text-xs text-gray-400 mt-auto line-clamp-2">{tool.explanation}</p>
                                                )}
                                                {tool.setup && <div className="mt-2"><span style={{fontSize:"0.6rem",color:"#0073bb",fontWeight:700,background:"#f2f8fd",padding:"2px 6px",borderRadius:4,border:"1px solid #d5e8f6"}}>PLAYBOOK</span></div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderModal = () => (
                <div className="modal-overlay" onClick={() => setSelectedTool(null)}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div style={{padding:"1rem 1.5rem",display:"flex",alignItems:"center",gap:"1rem",borderBottom:"1px solid #eaeded",flexShrink:0}}>
                            <div style={{width:48,height:48,borderRadius:4,border:"1px solid #eaeded",display:"flex",alignItems:"center",justifyContent:"center",padding:6,background:"#fafafa",flexShrink:0}}>
                                <img src={selectedTool.icon} style={{width:"100%",height:"100%",objectFit:"contain"}} onError={(e)=>e.target.style.display="none"} />
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                                <h2 style={{margin:0,fontSize:"1.3rem",fontWeight:700,color:"#16191f"}}>{selectedTool.name}</h2>
                                <span style={{color:"#545b64",fontSize:"0.8rem"}}>{selectedTool.category}</span>
                            </div>
                            <button onClick={() => setSelectedTool(null)} style={{background:"#fafafa",border:"1px solid #eaeded",borderRadius:4,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#545b64",flexShrink:0}}>
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        <div style={{display:"flex",borderBottom:"1px solid #eaeded",padding:"0 1.5rem",flexShrink:0}}>
                            <button className={"playbook-tab " + (activeTab === "vibe" ? "active" : "")} onClick={() => setActiveTab("vibe")}>Overview</button>
                            <button className={"playbook-tab " + (activeTab === "setup" ? "active" : "")} onClick={() => setActiveTab("setup")}>Setup Guide</button>
                            <button className={"playbook-tab " + (activeTab === "connections" ? "active" : "")} onClick={() => setActiveTab("connections")}>Connections{selectedTool.connections ? " (" + selectedTool.connections.length + ")" : ""}</button>
                        </div>
                        <div style={{padding:"1.5rem",overflowY:"auto",flex:1}}>
                            {activeTab === "vibe" && (
                                <div>
                                    <div className="mb-6">
                                        <span className="vibe-title">THE VIBE</span>
                                        <p style={{fontSize:"1rem",color:"#334155",lineHeight:1.6}}>{selectedTool.vibe}</p>
                                    </div>
                                    <div className="mb-6">
                                        <span className="simple-desc-title">SIMPLE EXPLANATION</span>
                                        <p style={{fontSize:"1rem",color:"#334155",lineHeight:1.6}}>{selectedTool.explanation}</p>
                                    </div>
                                    <div className="analogy-box">
                                        <span className="analogy-title">THE ANALOGY</span>
                                        <p style={{fontSize:"1.05rem",color:"#00529b",fontStyle:"italic",lineHeight:1.5}}>{selectedTool.analogy}</p>
                                    </div>
                                    <div style={{marginTop:"1.5rem",paddingTop:"1rem",borderTop:"1px solid #eaeded"}}>
                                        <p className="fact-text">FACT: {selectedTool.fact}</p>
                                    </div>
                                </div>
                            )}
                            {activeTab === "setup" && (
                                <div>
                                    {!selectedTool.setup ? (
                                        <p style={{color:"#8a94a6",fontStyle:"italic"}}>Setup playbook coming soon for this service.</p>
                                    ) : (
                                        <div>
                                            <div className="mb-4"><span style={{color:"#1e7e34",fontWeight:700,fontSize:"0.8rem",textTransform:"uppercase"}}>CONSOLE WALKTHROUGH</span></div>
                                            {selectedTool.setup.map((step, i) => (
                                                <div key={i} className="setup-step">
                                                    <div className="step-num">{step.s}</div>
                                                    <div>
                                                        <p style={{margin:0,color:"#16191f",fontWeight:500,fontSize:"0.9rem"}}>{step.a}</p>
                                                        <span style={{color:"#8a94a6",fontSize:"0.75rem",fontFamily:"monospace",background:"#f2f3f3",padding:"2px 6px",borderRadius:4,marginTop:4,display:"inline-block",border:"1px solid #eaeded"}}>{step.l}</span>
                                                    </div>
                                                </div>
                                            ))}
                                            {selectedTool.pipelines && selectedTool.pipelines.length > 0 && (
                                                <div style={{marginTop:"1.5rem",paddingTop:"1rem",borderTop:"1px solid #eaeded"}}>
                                                    <span style={{color:"#6b3fa0",fontWeight:700,fontSize:"0.8rem",textTransform:"uppercase",display:"block",marginBottom:"1rem"}}>COMMON ARCHITECTURES</span>
                                                    {selectedTool.pipelines.map((pipeline, pi) => (
                                                        <div key={pi} className="pipeline-card">
                                                            <div style={{marginBottom:"0.4rem"}}>
                                                                <span style={{fontWeight:700,color:"#16191f",fontSize:"0.9rem"}}>{pipeline.name}</span>
                                                                <span style={{color:"#8a94a6",fontSize:"0.8rem",marginLeft:"0.5rem"}}>— {pipeline.desc}</span>
                                                            </div>
                                                            <PipelineFlow steps={pipeline.steps} />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                            {activeTab === "connections" && (
                                <div>
                                    {!selectedTool.connections || selectedTool.connections.length === 0 ? (
                                        <p style={{color:"#8a94a6",fontStyle:"italic"}}>Connection details coming soon for this service.</p>
                                    ) : (
                                        <div>
                                            <div className="mb-4"><span style={{color:"#0073bb",fontWeight:700,fontSize:"0.8rem",textTransform:"uppercase"}}>COMPATIBLE SERVICES ({selectedTool.connections.length})</span></div>
                                            {selectedTool.connections.map((conn, i) => {
                                                const cIcon = getIcon(conn.n);
                                                return (
                                                <div key={i} className="conn-row" onClick={() => handleConnectionClick(conn.id)} title={"View " + conn.n}>
                                                    <span className="cat-badge">{conn.c}</span>
                                                    {cIcon ? <img src={cIcon} style={{width:22,height:22,objectFit:"contain",flexShrink:0}} onError={(e)=>e.target.style.display="none"} /> : <div style={{width:22,height:22,borderRadius:4,background:"#eaeded",flexShrink:0}}></div>}
                                                    <span style={{fontWeight:700,color:"#0073bb",fontSize:"0.85rem",minWidth:120,cursor:"pointer"}}>{conn.n}</span>
                                                    <span style={{color:"#545b64",fontSize:"0.8rem",flex:1}}>{conn.d}</span>
                                                </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col w-full">
                    <header className="aws-header w-full border-b border-[#161e2d]">
                        <svg width="30" height="18" viewBox="0 0 36 22" fill="none" className="mr-4">
                            <path d="M18 0L36 22H0L18 0Z" fill="white"/>
                        </svg>
                        <span className="font-bold text-lg tracking-tight">AWS Management Architecture</span>
                        <span className="ml-auto text-sm text-gray-400">{ALL_TOOLS.length} services</span>
                    </header>
                    <main className="flex-1 w-full relative">
                        {renderDashboard()}
                        {selectedTool && renderModal()}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
